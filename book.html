<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>책읽자.</title>
    <!-- 고급스러운 책 느낌을 주는 명조체 폰트 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-bg: #f4ecd8; /* 오래된 종이 느낌의 배경색 */
            --text-color: #2c2825; /* 진한 먹색 */
            --accent-color: #8b3a3a; /* 고전적인 분위기의 붉은색 */
            --gold: #c5a059; /* 금박 포인트 색상 */
            --spine-color: #4a3324; /* 책등 색상 */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Serif KR', serif;
            background-color: var(--paper-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 종이 질감을 위한 미세한 패턴 */
            background-image: 
                linear-gradient(90deg, transparent 95%, rgba(0,0,0,0.03) 95%),
                linear-gradient(transparent 95%, rgba(0,0,0,0.03) 95%);
            background-size: 30px 30px;
        }

        /* 책 모양의 컨테이너 */
        .book-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            background: #fffdf7; /* 밝은 속지 색상 */
            padding: 70px 50px 80px;
            box-sizing: border-box;
            box-shadow: 
                -15px 15px 30px rgba(0,0,0,0.1),
                10px 10px 20px rgba(0,0,0,0.05),
                inset 8px 0 20px rgba(0,0,0,0.04); /* 책이 접히는 부분의 그림자 강조 */
            border-radius: 4px 18px 18px 4px; /* 오른쪽(바깥쪽) 모서리는 둥글게 */
            text-align: center;
            border-left: 25px solid var(--spine-color); /* 양장본의 책등 표현 */
            /* 3D 펼쳐지는 애니메이션 적용 */
            transform-origin: left center;
            transform-style: preserve-3d;
            animation: openBook 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* 책 겉표지의 안쪽 질감 */
        .book-container::before {
            content: '';
            position: absolute;
            left: -25px;
            top: 0;
            bottom: 0;
            width: 5px;
            background: rgba(255,255,255,0.2);
            z-index: 10;
        }

        @keyframes openBook {
            0% { transform: perspective(1200px) rotateY(25deg) scale(0.95); opacity: 0; }
            100% { transform: perspective(1200px) rotateY(0deg) scale(1); opacity: 1; }
        }

        .decorative-line {
            width: 70%;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 40px auto;
            position: relative;
        }

        /* 장식선 가운데 다이아몬드 포인트 */
        .decorative-line::after {
            content: '◆';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: var(--gold);
            font-size: 12px;
            background: #fffdf7;
            padding: 0 10px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1.5;
            margin: 20px 0;
            color: var(--accent-color);
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
            letter-spacing: -1px;
        }

        h1 span.to-name {
            display: inline-block;
            font-size: 1.4rem;
            color: var(--text-color);
            font-weight: 300;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 5px;
            letter-spacing: 2px;
        }

        p.message {
            font-size: 1.15rem;
            color: #444;
            line-height: 2;
            margin-bottom: 50px;
            padding: 0 20px;
            word-break: keep-all;
        }

        .button-wrapper {
            margin-top: 20px;
        }

        /* 책 모양 링크 버튼 */
        .book-link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--spine-color);
            color: #fffdf7;
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
            border: 1px solid var(--spine-color);
        }

        /* 버튼 호버 시 빛이 지나가는 효과 (Shine effect) */
        .book-link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .book-link-btn:hover::before {
            left: 150%;
        }

        .book-link-btn:hover {
            background-color: #fffdf7;
            color: var(--spine-color);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transform: translateY(-3px);
        }

        .book-link-btn svg {
            width: 20px;
            height: 20px;
            margin-left: 10px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .book-link-btn:hover svg {
            transform: translateX(5px);
        }

        .book-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            color: var(--gold);
            opacity: 0.9;
        }
        
        /* 모바일 대응 반응형 설정 */
        @media (max-width: 600px) {
            .book-container {
                margin: 20px;
                padding: 50px 20px 60px;
                border-left-width: 15px;
            }
            h1 {
                font-size: 2.2rem;
            }
            h1 span.to-name {
                font-size: 1.2rem;
            }
            p.message {
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>

    <div class="book-container">
        <div class="book-icon">✒️</div>
        
        <h1>
            <span class="to-name">To. 손진유님</span><br>
            손진유의<br>책 읽기를 기원합니다
        </h1>
        
        <div class="decorative-line"></div>
        
        <p class="message">
            마음을 채우는 활자 속에서<br>
            새로운 지혜와 평안을 발견하시길 바랍니다.<br>
            당신의 독서 여정을 응원합니다.
        </p>
        
        <div class="button-wrapper">
            <!-- 요청하신 교보문고 링크 적용 -->
            <a href="https://product.kyobobook.co.kr/detail/S000001930216" target="_blank" rel="noopener noreferrer" class="book-link-btn">
                다음 책 확인하기
                <svg viewBox="0 0 24 24">
                    <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </a>
        </div>
    </div>

</body>
</html>
