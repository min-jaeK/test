<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀 초대장 💌</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a2e; /* 비밀스러운 짙은 밤하늘 색상 */
            font-family: 'Gowun Dodum', sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .invitation-card {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
            text-align: center;
            max-width: 320px;
            width: 90%;
            border: 1px solid #e94560;
            /* 카드가 둥둥 떠있는 애니메이션 효과 */
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .secret-title {
            color: #e94560;
            font-size: 1.1rem;
            margin-bottom: 25px;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        .main-message {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 30px;
            line-height: 1.4;
            color: #ffffff;
        }

        .details {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-size: 1.2rem;
            line-height: 1.8;
            border: 1px dashed rgba(255, 255, 255, 0.2);
        }

        .highlight {
            color: #ffd700; /* 노란색 포인트 */
            font-weight: bold;
            font-size: 1.3rem;
        }

        .footer-message {
            font-size: 1.5rem;
            color: #ffb6b9;
            margin-top: 10px;
        }

        .heart {
            display: inline-block;
            color: #ff4d4d;
            /* 두근두근 하트 애니메이션 */
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="invitation-card">
        <div class="secret-title">쉿! 우리 둘만의 비밀 초대장 💌</div>
        
        <div class="main-message">
            장성빈 <span style="color: #ffb6b9;">짱</span> 사랑해!
        </div>
        
        <div class="details">
            📅 3월 27일<br>
            ⏰ 오후 11시 30분까지<br>
            📍 <span class="highlight">GS25</span>로 와
        </div>
        
        <div class="footer-message">
            사랑해 <span class="heart">❤️</span>
        </div>
    </div>

</body>
</html>
