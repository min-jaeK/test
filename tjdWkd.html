<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀 초대장 💌</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 및 배경 설정 (청첩장 느낌의 차분한 크림색) */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fdfaf5; /* 따뜻한 크림색 배경 */
            background-image: radial-gradient(#f1eadd 1px, transparent 1px);
            background-size: 20px 20px; /* 은은한 점무늬 패턴 */
            font-family: 'Nanum Myeongjo', serif;
            color: #4a4a4a; /* 부드러운 차콜색 글씨 */
            overflow: hidden; /* falling 요소들이 화면 밖으로 나가지 않도록 */
        }

        /* 청첩장 스타일의 우아한 카드 디자인 */
        .invitation-card {
            background-color: #ffffff;
            padding: 60px 40px;
            border-radius: 5px; /* 각진 느낌 */
            /* 고급스러운 이중 테두리 (금빛/회색 조화) */
            border: 1px solid #d4af37;
            outline: 4px solid #ffffff;
            outline-offset: -10px;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.15); /* 은은한 금빛 그림자 */
            text-align: center;
            max-width: 380px;
            width: 90%;
            /* 카드가 부드럽게 숨쉬듯 움직이는 애니메이션 */
            animation: breathe 4s ease-in-out infinite;
            z-index: 10;
            position: relative;
        }

        @keyframes breathe {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-5px) scale(1.01); }
        }

        /* 카드 상단 장식 라인 */
        .card-deco-top {
            font-size: 1.5rem;
            color: #d4af37;
            margin-bottom: 20px;
        }

        .secret-title {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #888;
            margin-bottom: 35px;
            font-weight: 400;
        }

        .main-message {
            font-size: 2.2rem;
            font-weight: 800;
            color: #d4af37; /* 금빛 포인트 */
            margin-bottom: 45px;
            line-height: 1.4;
            word-break: keep-all; /* 한글 줄바꿈 예쁘게 */
        }

        .details {
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 30px 0;
            margin-bottom: 45px;
            font-size: 1.2rem;
            line-height: 2.2;
            color: #555;
        }

        .highlight {
            font-weight: 700;
            color: #4a4a4a;
        }

        /* 고급스러운 버튼 스타일 */
        .love-button {
            background-color: #fdfaf5;
            border: 1px solid #d4af37;
            border-radius: 0; /* 각진 버튼 */
            padding: 18px 40px;
            font-size: 1.4rem;
            font-family: inherit;
            color: #d4af37;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .love-button:hover {
            background-color: #d4af37;
            color: #ffffff;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .love-button:active {
            transform: scale(0.97);
        }

        /* 배경에서 떨어지는 요소 스타일 (💕 추가됨) */
        .falling-element {
            position: fixed;
            top: -20px;
            pointer-events: none;
            z-index: 1; /* 카드 뒤로 */
            animation: fall 7s linear infinite;
            opacity: 0.5;
            color: #d4af37; /* 금빛 계열로 통일 */
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        /* --- 클릭 이벤트 효과 스타일 --- */

        /* 강력하게 나타나는 윙크 이모티콘 */
        #emoji-super-pop {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0) rotate(-180deg); /* 처음엔 숨기고 뒤집음 */
            font-size: 15rem; /* 아주 크게 */
            z-index: 100; /* 최상단 */
            display: none; /* 클릭 전까지 숨김 */
            color: #ff9f43; /* 주황빛 도는 금색 */
            text-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* 강력한 '콰광!' 애니메이션 정의 */
        @keyframes super-pop-in {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-180deg); opacity: 0; }
            60% { transform: translate(-50%, -50%) scale(1.4) rotate(10deg); opacity: 1; } /* 크게 회전하며 */
            80% { transform: translate(-50%, -50%) scale(0.9) rotate(-5deg); } /* 살짝 튕김 */
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        /* 서서히 사라짐 */
        @keyframes fade-out {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .animate-super-pop {
            display: block !important;
            animation: super-pop-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .animate-fade-fast {
            animation: fade-out 0.4s ease-in forwards;
        }

        /* 폭죽 파티클 스타일 */
        .firework-particle {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99;
            animation: explode 1s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="falling-container"></div>

    <div id="emoji-super-pop">😉</div>

    <div class="invitation-card">
        <div class="card-deco-top">❦</div>
        <div class="secret-title">Private Invitation</div>
        
        <div class="main-message">
            장성빈 완전 사랑해~~
        </div>
        
        <div class="details">
            📅 일시: 3월 27일<br>
            ⏰ 시간: <span class="highlight">오후 11시 30분</span>까지<br>
            📍 장소: <span class="highlight">GS25</span>로 와
        </div>
        
        <button class="love-button" onclick="showDramaticEffect()">
            사랑해
        </button>
    </div>

    <script>
        // 배경 떨어지는 요소 생성 (꽃, 기타, 하트 💕 조합)
        function createFallingElement() {
            const container = document.getElementById('falling-container');
            const element = document.createElement('div');
            element.classList.add('falling-element');

            // 요소 종류 정의 (💕 추가됨)
            const types = ['🌸', '🎸', '💕', '🌼'];
            element.innerText = types[Math.floor(Math.random() * types.length)];

            // 랜덤 속성 설정 (위치, 속도, 크기)
            element.style.left = Math.random() * 100 + 'vw';
            element.style.animationDuration = Math.random() * 3 + 5 + 's'; // 5~8초
            element.style.fontSize = Math.random() * 1 + 1 + 'rem'; // 1~2rem

            container.appendChild(element);

            // 애니메이션 종료 후 삭제
            setTimeout(() => {
                element.remove();
            }, 8000); 
        }

        // 0.5초마다 요소 생성
        setInterval(createFallingElement, 500);

        // --- 폭죽 효과 함수 ---
        function createFirework() {
            const colors = ['#d4af37', '#fdfaf5', '#ff9f43', '#ffffff']; // 금빛, 흰색 조합
            const particleCount = 40; // 파티클 개수

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('firework-particle');
                
                // 화면 중앙에서 시작
                particle.style.top = '50%';
                particle.style.left = '50%';
                
                // 랜덤 색상
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // 랜덤한 폭발 방향 및 거리 계산 (CSS 변수로 전달)
                const angle = Math.random() * Math.PI * 2; // 360도
                const velocity = Math.random() * 200 + 100; // 폭발 힘
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);

                // 랜덤 크기
                const size = Math.random() * 6 + 4;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;

                document.body.appendChild(particle);

                // 애니메이션 후 삭제
                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        }

        // --- 버튼 클릭시 강력한 연출 함수 ---
        function showDramaticEffect() {
            const emojiDiv = document.getElementById('emoji-super-pop');
            
            // 이미 애니메이션 중이면 중복 실행 방지
            if (emojiDiv.classList.contains('animate-super-pop')) return;

            // 1. 폭죽 터뜨리기
            createFirework();

            // 2. 강력한 윙크 이모지 등장
            emojiDiv.classList.add('animate-super-pop');

            // 2초 후 서서히 사라짐
            setTimeout(() => {
                emojiDiv.classList.remove('animate-super-pop');
                emojiDiv.classList.add('animate-fade-fast');
            }, 2000);

            // 2.5초 후 완전 초기화
            setTimeout(() => {
                emojiDiv.classList.remove('animate-fade-fast');
                emojiDiv.style.display = 'none';
            }, 2500);
        }
    </script>

</body>
</html>
