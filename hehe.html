<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김민재 생일 초대장</title>
    <!-- 귀여운 한글 폰트 (주아체) 불러오기 -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <!-- 꽃가루 효과를 위한 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary-color: #ff4b4b;
            --secondary-color: #ff8c69;
            --text-color: #4a3728;
            --bg-color: #fff9f5;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--secondary-color) 10%, transparent 10%);
            background-size: 20px 20px;
            font-family: 'Jua', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
        }

        .invitation-card {
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 75, 75, 0.2);
            padding: 40px 30px;
            text-align: center;
            max-width: 380px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        /* 둥둥 떠다니는 애니메이션 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .character-container {
            animation: float 3s ease-in-out infinite;
            margin-bottom: 20px;
        }

        .title {
            font-size: 1.8rem;
            color: var(--primary-color);
            margin: 10px 0;
            line-height: 1.4;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #ffb7b2;
            margin-bottom: 20px;
        }

        .info-box {
            background-color: #fff9f9;
            border: 2px dashed var(--secondary-color);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .info-box p {
            margin: 5px 0;
        }

        .emoji-icon {
            font-size: 1.3rem;
            margin-right: 5px;
        }

        .rsvp-button {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 30px;
            font-size: 1.3rem;
            font-family: 'Jua', sans-serif;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 75, 75, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .rsvp-button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 20px rgba(255, 75, 75, 0.5);
        }

        .rsvp-button:active {
            transform: translateY(2px);
        }

        /* 성공 메시지 박스 */
        #success-msg {
            display: none;
            color: var(--primary-color);
            font-size: 1.2rem;
            margin-top: 15px;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="invitation-card">
        <!-- 직접 그린 귀여운 토마토 SVG 캐릭터 -->
        <div class="character-container">
            <svg viewBox="0 0 150 150" width="150" height="150" xmlns="http://www.w3.org/2000/svg">
                <!-- 토마토 잎 & 줄기 -->
                <path d="M 75 40 Q 75 25 85 20" fill="none" stroke="#4CAF50" stroke-width="5" stroke-linecap="round"/>
                <path d="M 75 45 Q 50 35 40 55 Q 60 50 75 45" fill="#4CAF50"/>
                <path d="M 75 45 Q 100 35 110 55 Q 90 50 75 45" fill="#4CAF50"/>
                <path d="M 75 45 Q 65 65 75 75 Q 85 65 75 45" fill="#4CAF50"/>
                
                <!-- 토마토 몸통 -->
                <circle cx="75" cy="90" r="45" fill="#FF4B4B"/>
                
                <!-- 반짝이는 하이라이트 -->
                <path d="M 45 65 Q 55 50 75 52" fill="none" stroke="#FF8C69" stroke-width="5" stroke-linecap="round"/>

                <!-- 눈 -->
                <circle cx="55" cy="85" r="4.5" fill="#4A3728"/>
                <circle cx="95" cy="85" r="4.5" fill="#4A3728"/>
                
                <!-- 볼터치 -->
                <ellipse cx="40" cy="95" rx="7" ry="4" fill="#FF8C69" opacity="0.8"/>
                <ellipse cx="110" cy="95" rx="7" ry="4" fill="#FF8C69" opacity="0.8"/>
                
                <!-- 입 -->
                <path d="M 70 95 Q 75 102 80 95" fill="none" stroke="#4A3728" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </div>

        <h1 class="title">🍅 서인의 생일파티에<br>초대합니다! 🍅</h1>
        <p class="subtitle">2026년 1월 17일<br>🎉 막내야 생일 축하해! 🎉</p>

        <div class="info-box">
            <p><span class="emoji-icon">📅</span> <b>언제?</b><br>2026년 1월 17일</p>
            <p><span class="emoji-icon">⏰</span> <b>시간?</b><br>오후 6시 30분</p>
            <p><span class="emoji-icon">📍</span> <b>어디서?</b><br>멋쟁이 토마토 레스토랑 🍝</p>
        </div>

        <button class="rsvp-button" id="rsvp-btn">
            파티 참석하기 💌
        </button>
        
        <div id="success-msg">
            와아! 파티에서 만나요! 🥳🍅
        </div>
    </div>

    <script>
        // 배경에 주기적으로 터지는 폭죽 효과 함수
        function runBackgroundFireworks() {
            confetti({
                particleCount: 40,
                startVelocity: 30,
                spread: 360,
                origin: {
                    x: Math.random(),
                    // 위에서부터 아래로 떨어지는 느낌을 위해 y 위치 조정
                    y: Math.random() - 0.2
                },
                zIndex: 1, // 카드 뒤쪽에서 터지도록 설정
                colors: ['#ff4b4b', '#ff8c69', '#4caf50', '#8bc34a', '#ffeb3b']
            });
            // 1.5초에서 3.5초 사이의 랜덤한 간격으로 폭죽 반복
            setTimeout(runBackgroundFireworks, Math.random() * 2000 + 1500);
        }

        // 페이지 진입 시 배경 폭죽 효과 시작
        runBackgroundFireworks();

        document.getElementById('rsvp-btn').addEventListener('click', function() {
            // 버튼 숨기고 완료 메시지 표시
            this.style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';

            // 귀여운 토마토 색상 꽃가루(Confetti) 효과 실행
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    zIndex: 100, // 버튼 클릭 효과는 화면 가장 앞에 오도록 설정
                    colors: ['#ff4b4b', '#ff8c69', '#4caf50', '#8bc34a', '#ffeb3b']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    zIndex: 100,
                    colors: ['#ff4b4b', '#ff8c69', '#4caf50', '#8bc34a', '#ffeb3b']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        });
    </script>
</body>
</html>
